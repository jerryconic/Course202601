<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript-4</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function btnOk_Click(){
            let score = parseInt(document.getElementById("txtScore").value, 10);
            let obj = document.getElementById("txtResult");

            if(score < 60){
                obj.value = "不及格";
                obj.style.backgroundColor = "lightyellow";
                obj.style.color = "red";
            }else{
                obj.value = "及格";
                obj.style.backgroundColor = "lightcyan";
                obj.style.color = "blue";
            }
        }
    </script>
</head>
<body class="bg-light">

    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow p-4" style="width: 400px;">
            <h3 class="text-center mb-4">成績判斷</h3>

            <div class="row mb-3 align-items-center">
                <label for="txtScore" class="col-3 col-form-label text-end">
                    成績:
                </label>
                <div class="col-9">
                    <input id="txtScore" class="form-control text-center">
                </div>
            </div>

            <div class="row mb-4 align-items-center">
                <label for="txtResult" class="col-3 col-form-label text-end">
                    結果:
                </label>
                <div class="col-9">
                    <input id="txtResult" class="form-control text-center" readonly>
                </div>
            </div>

            <button class="btn btn-primary w-100" onclick="btnOk_Click()">
                計算
            </button>
        </div>
    </div>

</body>
</html>
