<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript-3</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function btnAdd_Click(){
            let a = parseFloat(document.getElementById("txtA").value);
            let b = parseFloat(document.getElementById("txtB").value);
            document.getElementById("txtAns").value = (a + b).toFixed(2);
        }

        function btnSub_Click(){
            let a = parseFloat(document.getElementById("txtA").value);
            let b = parseFloat(document.getElementById("txtB").value);
            document.getElementById("txtAns").value = (a - b).toFixed(2);
        }

        function btnMul_Click(){
            let a = parseFloat(document.getElementById("txtA").value);
            let b = parseFloat(document.getElementById("txtB").value);
            document.getElementById("txtAns").value = (a * b).toFixed(2);
        }

        function btnDiv_Click(){
            let a = parseFloat(document.getElementById("txtA").value);
            let b = parseFloat(document.getElementById("txtB").value);
            document.getElementById("txtAns").value = (a / b).toFixed(2);
        }
    </script>
</head>
<body class="bg-light">

    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow p-4" style="width: 400px;">
            <h3 class="text-center mb-4">簡易計算機</h3>

            <div class="row mb-3 align-items-center">
                <label for="txtA" class="col-3 col-form-label text-end">A =</label>
                <div class="col-9">
                    <input id="txtA" class="form-control text-end">
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label for="txtB" class="col-3 col-form-label text-end">B =</label>
                <div class="col-9">
                    <input id="txtB" class="form-control text-end">
                </div>
            </div>

            <div class="row mb-4 align-items-center">
                <label for="txtAns" class="col-3 col-form-label text-end">Ans =</label>
                <div class="col-9">
                    <input id="txtAns" class="form-control text-end" readonly>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-center">
                <button class="btn btn-primary" onclick="btnAdd_Click()">+</button>
                <button class="btn btn-primary" onclick="btnSub_Click()">-</button>
                <button class="btn btn-primary" onclick="btnMul_Click()">*</button>
                <button class="btn btn-primary" onclick="btnDiv_Click()">/</button>
            </div>
        </div>
    </div>

</body>
</html>
